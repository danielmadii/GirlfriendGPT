<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GirlfriendGPT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      font-size: 13px;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────── */
    .header {
      background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
      padding: 18px 18px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #21262d;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(37,211,102,0.5) 50%, transparent);
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(37,211,102,0.3);
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.4px;
    }
    .header-text .subtitle {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }
    .gh-btn {
      margin-left: auto;
      color: #8b949e;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .gh-btn:hover { background: #21262d; color: #e6edf3; }

    /* ── STATUS ─────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .status-dot.active   { background: #3fb950; box-shadow: 0 0 0 2px rgba(63,185,80,0.2); animation: pulse 2s infinite; }
    .status-dot.paused   { background: #d29922; box-shadow: 0 0 0 2px rgba(210,153,34,0.2); }
    .status-dot.disabled { background: #484f58; }
    .status-dot.error    { background: #f85149; box-shadow: 0 0 0 2px rgba(248,81,73,0.2); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .status-text { font-size: 12px; color: #8b949e; }

    /* ── SECTIONS ───────────────────── */
    .section { padding: 14px 18px; border-bottom: 1px solid #21262d; }

    /* ── TOGGLES ────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-info .lbl {
      font-size: 13px;
      font-weight: 500;
      color: #e6edf3;
    }
    .toggle-info .sub {
      font-size: 11px;
      color: #8b949e;
      margin-top: 1px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #21262d;
      border-radius: 24px;
      border: 1px solid #30363d;
      transition: 0.25s cubic-bezier(.4,0,.2,1);
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      background: #484f58;
      border-radius: 50%;
      transition: 0.25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    input:checked + .slider { background: #238636; border-color: #2ea043; }
    input:checked + .slider::before { transform: translateX(20px); background: #fff; }

    /* ── INPUT ──────────────────────── */
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }
    .chat-input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 9px 12px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input:focus {
      border-color: #238636;
      box-shadow: 0 0 0 3px rgba(35,134,54,0.15);
    }
    .chat-input::placeholder { color: #484f58; }

    /* ── WARN ───────────────────────── */
    .warn-box {
      background: rgba(210,153,34,0.08);
      border: 1px solid rgba(210,153,34,0.25);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      color: #d29922;
      line-height: 1.55;
    }

    /* ── LAST REPLY ─────────────────── */
    .reply-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 42px;
    }
    .reply-text {
      font-size: 12px;
      color: #484f58;
      line-height: 1.55;
      word-break: break-word;
    }
    .reply-text.has-reply { color: #e6edf3; }
    .risk-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .risk-badge.low    { background: rgba(63,185,80,0.15);  color: #3fb950; }
    .risk-badge.medium { background: rgba(210,153,34,0.15); color: #d29922; }
    .risk-badge.high   { background: rgba(248,81,73,0.15);  color: #f85149; }

    /* ── ACTIONS ────────────────────── */
    .actions {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
    }
    .btn {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-settings {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }
    .btn-settings:hover { background: #2d333b; }
    .btn-save {
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      box-shadow: 0 2px 8px rgba(35,134,54,0.35);
    }
    .btn-save:hover { box-shadow: 0 4px 16px rgba(35,134,54,0.5); }

    .section-lbl {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">💬</div>
    <div class="header-text">
      <h1>GirlfriendGPT</h1>
      <div class="subtitle">WhatsApp · OpenAI · Your style</div>
    </div>
    <a class="gh-btn" href="https://github.com/danielgmansour/GirlfriendGPT" target="_blank" title="GitHub">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

  <div class="status-bar">
    <div class="status-dot disabled" id="statusDot"></div>
    <div class="status-text" id="statusText">Loading...</div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="lbl">Enable Assistant</div>
        <div class="sub">Master on/off switch</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleEnabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <div class="lbl">Pause Assistant</div>
        <div class="sub">Temporarily suspend</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="togglePaused" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <div class="lbl">⚡ Auto-Send</div>
        <div class="sub">Send low-risk replies automatically</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleAutoSend" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section" id="autoSendWarning" style="display:none">
    <div class="warn-box">
      ⚠️ Auto-Send is ON — replies will send automatically. Keep Safety Mode enabled.
    </div>
  </div>

  <div class="section">
    <label class="field-label" for="allowedChatInput">Allowed Chat</label>
    <input
      type="text"
      id="allowedChatInput"
      class="chat-input"
      placeholder="Contact name or +961..."
    />
  </div>

  <div class="section">
    <div class="section-lbl">Last Reply</div>
    <div class="reply-card">
      <div class="reply-text" id="lastReply">No reply generated yet.</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-settings" id="openSettings">⚙️ Settings</button>
    <button class="btn btn-save" id="saveBtn">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
